volumes:
    acme:
    certs:
    html:
    vhost:
    grafana:
    prometheus:

networks:
    host_network:
        name: proxy-network
        driver: bridge

services:
    nginx-proxy:
        container_name: nginx-proxy
        image: jwilder/nginx-proxy
        restart: unless-stopped
        mem_limit: 1g
        networks:
            - default
            - host_network
        ports:
            - "443:443"
            - "80:80"
        volumes:
            - html:/usr/share/nginx/html
            - ./config/nginx/certs/:/etc/nginx/certs:ro
            - vhost:/etc/nginx/vhost.d
            - /var/run/docker.sock:/tmp/docker.sock:ro
            - ./config/custom_proxy_settings.conf:/etc/nginx/conf.d/custom_proxy_settings.conf:ro
        environment:
            - DEFAULT_HOST=${DEFAULT_HOST:-fit24.local}
        labels:
            com.github.nginx-proxy.nginx: ""

    acme-companion:
        image: nginxproxy/acme-companion
        container_name: nginx-proxy-acme
        restart: unless-stopped
        mem_limit: 1g
        environment:
            - DEFAULT_EMAIL=${DEFAULT_EMAIL:-admin@whoami.local}
            - NGINX_PROXY_CONTAINER=nginx-proxy
        volumes_from:
            - nginx-proxy
        volumes:
            - certs:/etc/nginx/certs:rw
            - acme:/etc/acme.sh
            - vhost:/etc/nginx/vhost.d
            - html:/usr/share/nginx/html
            - /var/run/docker.sock:/var/run/docker.sock:ro

    whoami:
        container_name: whoami
        image: jwilder/whoami
        restart: unless-stopped
        mem_limit: 512m
        environment:
            - VIRTUAL_HOST=${WHOAMI_VIRTUAL_HOST:-whoami.local}
            - LETSENCRYPT_HOST=${WHOAMI_LETSENCRYPT_HOST:-whoami.local}
            - HTTPS_METHOD=${WHOAMI_HTTPS_METHOD:-noredirect}

    node-exporter:
        container_name: node-exporter
        image: prom/node-exporter:latest
        restart: unless-stopped
        mem_limit: 512m
        networks:
            - default
            - host_network
        environment:
            - VIRTUAL_HOST=${NODE_VIRTUAL_HOST:-grafana.local}
            - VIRTUAL_PORT=${NODE_PORT:-3000}
            - LETSENCRYPT_HOST=${NODE_LETSENCRYPT_HOST:-grafana.local}
            - HTTPS_METHOD=${NODE_HTTPS_METHOD:-noredirect}
        labels:
            prometheus.scrape: "true"
            prometheus.job: "node"
            prometheus.host: "${NODE_VIRTUAL_HOST:-node.local}"
            prometheus.port: "9100"
            prometheus.path: "/metrics"
        volumes:
            - /proc:/host/proc:ro
            - /sys:/host/sys:ro
            - /:/rootfs:ro
        command:
            - '--path.procfs=/host/proc'
            - '--path.rootfs=/rootfs'
            - '--path.sysfs=/host/sys'
            - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
        ports:
            - ${NODE_PORT:-9100}:9100

    grafana:
        container_name: grafana
        image: grafana/grafana-enterprise
        restart: unless-stopped
        mem_limit: 1g
        environment:
            - VIRTUAL_HOST=${GRAFANA_VIRTUAL_HOST:-grafana.local}
            - VIRTUAL_PORT=${GRAFANA_PORT:-3000}
            - LETSENCRYPT_HOST=${GRAFANA_LETSENCRYPT_HOST:-grafana.local}
            - HTTPS_METHOD=${GRAFANA_HTTPS_METHOD:-noredirect}
        volumes:
            - grafana:/var/lib/grafana
        ports:
            - ${GRAFANA_PORT:-3000}:3000

    prometheus:
        container_name: prometheus
        image: prom/prometheus:latest
        restart: unless-stopped
        mem_limit: 3g
        user: root
        networks:
            - default
            - host_network
        environment:
            - VIRTUAL_HOST=${PROMETHEUS_VIRTUAL_HOST:-prometheus.local}
            - VIRTUAL_PORT=${PROMETHEUS_PORT:-9090}
            - LETSENCRYPT_HOST=${PROMETHEUS_LETSENCRYPT_HOST:-prometheus.local}
            - HTTPS_METHOD=${PROMETHEUS_HTTPS_METHOD:-noredirect}
        volumes:
            - ./config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
            - ./config/prometheus/users.yml:/etc/prometheus/users.yml
            - prometheus:/prometheus
            - /var/run/docker.sock:/var/run/docker.sock:ro
        command:
            - '--config.file=/etc/prometheus/prometheus.yml'
            - '--storage.tsdb.path=/prometheus'
            - '--web.console.libraries=/etc/prometheus/console_libraries'
            - '--web.console.templates=/etc/prometheus/consoles'
            - '--web.enable-lifecycle'
            - '--web.enable-admin-api'
        ports:
            - ${PROMETHEUS_PORT:-9090}:9090
