global:
  scrape_interval:     15s

scrape_configs:
  - job_name: "prometheus"
    scrape_interval: 5s
    static_configs:
    - targets: ["prometheus:9090"]

  - job_name: "docker-proxy"
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 15s
    relabel_configs:
      - source_labels: [__meta_docker_container_label_prometheus_scrape]
        regex: "true"
        action: keep
      - source_labels: [__meta_docker_network_name]
        regex: "proxy-network"
        action: keep
      - source_labels: [__meta_docker_container_label_prometheus_port]
        regex: ".+"
        action: keep
      - source_labels: [__meta_docker_network_ip, __meta_docker_container_label_prometheus_port]
        separator: ":"
        regex: "(.+):(.+)"
        replacement: "$1:$2"
        target_label: __address__
      - source_labels: [__meta_docker_container_label_prometheus_path]
        regex: "(.+)"
        target_label: __metrics_path__
      - source_labels: [__meta_docker_container_label_prometheus_scheme]
        regex: "(.+)"
        target_label: __scheme__
      - source_labels: [__meta_docker_container_label_prometheus_job]
        regex: "(.+)"
        target_label: job
      - source_labels: [__meta_docker_container_label_prometheus_host]
        regex: "(.+)"
        target_label: instance
      - source_labels: [__meta_docker_container_name]
        regex: "/(.+)"
        target_label: container